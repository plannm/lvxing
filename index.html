<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>私人旅行足迹工作台 v38.9 - 纯净版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDjsmMiLV3f80dyJGCNWkpmTnoYOrjoaI",
            authDomain: "my-movies-f84ad.firebaseapp.com",
            databaseURL: "https://my-movies-f84ad-default-rtdb.firebaseio.com",
            projectId: "my-movies-f84ad",
            storageBucket: "my-movies-f84ad.firebasestorage.app",
            messagingSenderId: "575473837602",
            appId: "1:575473837602:web:2e02c0ee50565e4426cc7b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myID = "Personal_Travel_Data"; 
        window.dbRef = ref(db, 'travelData/' + myID);

        window.trips = {}; 
        window.activeId = 'dashboard';

        onValue(window.dbRef, (snapshot) => {
            const data = snapshot.val();
            window.trips = data || {};
            if(!window.trips['history_only']){
                window.trips['history_only'] = { name: "📜 历史足迹(点亮专用)", isHistory: true, days: [{date:'无需填写', rows:[{loc:''}]}] };
            }
            document.getElementById('syncStatus').innerText = "☁️ 拼图已实时同步";
            renderSidebar();
            refreshView();
        });

        window.saveToCloud = () => set(window.dbRef, window.trips);
    </script>

    <style>
        :root { --sidebar-bg: #1e293b; --accent: #3b82f6; --bg-main: #f1f5f9; --border-color: #e2e8f0; --radius: 12px; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-main); overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--sidebar-bg); color: #f8fafc; display: flex; flex-direction: column; flex-shrink: 0; }
        .side-header { padding: 24px 20px; font-size: 18px; font-weight: 700; background: #0f172a; display: flex; justify-content: space-between; align-items: center; }
        
        .dashboard-link { padding: 15px 20px; margin: 10px 12px; border-radius: 8px; cursor: pointer; background: rgba(255,255,255,0.05); color: #fff; font-weight: 600; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .dashboard-link.active { background: var(--accent); border-color: var(--accent); }
        
        #trip-list { flex: 1; overflow-y: auto; padding: 0 0 10px 0; }
        .trip-item { padding: 12px 15px; cursor: pointer; color: #94a3b8; margin: 4px 12px; border-radius: 8px; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .trip-item.active { background: rgba(59, 130, 246, 0.2); color: white; border-left: 4px solid var(--accent); }
        .history-item { border: 1px dashed #475569; margin-top: 20px; color: #fbbf24; }

        #main { flex: 1; overflow: auto; display: flex; flex-direction: column; }
        .page-content { padding: 30px; display: none; flex: 1; }
        .page-content.active { display: block; }

        #map-container { height: 600px; width: 100%; border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.08); background: #f8fafc; margin-top: 20px; }
        
        .summary-bar { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 24px; border-radius: var(--radius); flex: 1; border: 1px solid var(--border-color); text-align: center; }
        .stat-card .label { font-size: 14px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 32px; font-weight: 800; color: #1e293b; margin-top: 8px; }

        .excel-box { background: white; padding: 15px; border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        table { border-collapse: collapse; width: 100%; font-size: 14px; }
        th { background: #f8fafc; color: #64748b; padding: 12px; border: 1px solid var(--border-color); text-align: center; }
        td { border: 1px solid var(--border-color); height: 45px; background: white; }
        input { width: 100%; height: 100%; border: none; text-align: center; outline: none; background: transparent; font-size: 14px; }
        
        .btn-add { background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 15px; transition: 0.2s; }
        .btn-add:hover { background: #059669; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="side-header"><span>🌍 我的足迹</span><button onclick="addTrip()" style="background:var(--accent);border:none;color:white;width:28px;border-radius:6px;cursor:pointer">+</button></div>
    <div id="go-dashboard" class="dashboard-link" onclick="loadDashboard()">🏠 全局总览拼图</div>
    <div style="padding: 0 20px; font-size: 11px; color: #475569; margin-bottom: 5px; margin-top: 10px;">行程列表</div>
    <div id="trip-list"></div>
    <div style="padding:15px; background:#0f172a; font-size:11px; color:#64748b" id="syncStatus">📡 载入中...</div>
</div>

<div id="main">
    <div id="page-dashboard" class="page-content">
        <h2 style="margin-top:0">我的足迹拼图</h2>
        <div class="summary-bar">
            <div class="stat-card"><div class="label">已点亮区域</div><div class="value" id="stat-cities">0</div></div>
            <div class="stat-card"><div class="label">累计行程数</div><div class="value" id="stat-trips">0</div></div>
        </div>
        <div id="map-container"></div>
    </div>

    <div id="page-detail" class="page-content">
        <h2 id="detail-title">行程详情</h2>
        <button class="btn-add" id="add-btn" onclick="addDay()">+ 新增条目</button>
        <div class="excel-box">
            <table id="main-table">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let map = null;
    let geoJsonLayers = [];
    const colors = ["#4776E6", "#10b981", "#FF8008", "#ef4444", "#8e44ad", "#2c3e50", "#16a085"];

    function initMap() {
        if (map) return;
        map = L.map('map-container').setView([30, 105], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);
    }

    async function fetchBoundary(city) {
        const queries = [city];
        if (city.length < 4 && !city.endsWith('市') && !city.endsWith('区')) queries.push(city + "市");
        for (let q of queries) {
            try {
                const url = `https://nominatim.openstreetmap.org/search?format=json&polygon_geojson=1&q=${encodeURIComponent(q)}&limit=3`;
                const resp = await fetch(url);
                const results = await resp.json();
                if (results && results.length > 0) {
                    const bestMatch = results.find(r => r.class === "boundary") || results[0];
                    if (bestMatch.geojson && bestMatch.geojson.type !== "Point") return { geo: bestMatch.geojson };
                    if (bestMatch.geojson.type === "Point") this.lastPoint = bestMatch.geojson;
                }
            } catch (e) {}
        }
        return null;
    }

    async function updateMapFills() {
        geoJsonLayers.forEach(l => map.removeLayer(l));
        geoJsonLayers = [];
        const citySet = new Set();
        Object.values(window.trips).forEach(t => {
            if (t.days) t.days.forEach(d => d.rows.forEach(r => { if (r.loc && r.loc.trim()) citySet.add(r.loc.trim()); }));
        });
        document.getElementById('stat-cities').innerText = citySet.size;
        
        let colorIdx = 0;
        for (let city of citySet) {
            this.lastPoint = null;
            const result = await fetchBoundary(city);
            const color = colors[colorIdx % colors.length];
            colorIdx++;

            if (result && result.geo) {
                const layer = L.geoJSON(result.geo, { style: { fillColor: color, color: "#fff", weight: 1, fillOpacity: 0.65 } }).addTo(map);
                layer.bindPopup(`<b>${city}</b>`);
                geoJsonLayers.push(layer);
            } else if (this.lastPoint) {
                const layer = L.circle([this.lastPoint.coordinates[1], this.lastPoint.coordinates[0]], { radius: 25000, fillColor: color, color: "#fff", weight: 1, fillOpacity: 0.6 }).addTo(map);
                layer.bindPopup(`<b>${city}</b>`);
                geoJsonLayers.push(layer);
            }
        }
    }

    window.loadDashboard = () => {
        window.activeId = 'dashboard';
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.getElementById('page-dashboard').classList.add('active');
        renderSidebar(); initMap();
        setTimeout(() => { map.invalidateSize(); updateMapFills(); }, 200);
        document.getElementById('stat-trips').innerText = Object.keys(window.trips).filter(k => k!=='history_only').length;
    };

    window.loadTrip = (id) => {
        window.activeId = id;
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.getElementById('page-detail').classList.add('active');
        document.getElementById('detail-title').innerText = window.trips[id].name;
        renderSidebar();
        renderTable(window.trips[id].isHistory);
    };

    function renderTable(isHistory) {
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        // 简化表格，只保留城市名和序号
        thead.innerHTML = `<tr><th style="width:80px">序号</th><th>城市名称 (输入后点击空白处点亮)</th><th style="width:80px">操作</th></tr>`;
        const trip = window.trips[window.activeId];
        
        const rowsToRender = isHistory ? trip.days[0].rows : [].concat(...trip.days.map(d => d.rows));
        
        rowsToRender.forEach((row, rIdx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td style="text-align:center; color:#94a3b8">${rIdx+1}</td>
                <td><input value="${row.loc||''}" placeholder="例如：兰州, 巴黎, 东京..." onblur="updateLocOnly(${rIdx},this.value)"></td>
                <td style="text-align:center;cursor:pointer;color:#ef4444" onclick="delSimpleRow(${rIdx})">✕</td>`;
            tbody.appendChild(tr);
        });
    }

    window.updateLocOnly = (idx, val) => {
        const trip = window.trips[window.activeId];
        if(trip.isHistory) trip.days[0].rows[idx].loc = val;
        else {
            // 处理普通行程中的坐标更新
            let count = 0;
            for(let d of trip.days){
                for(let r of d.rows){
                    if(count === idx) { r.loc = val; break; }
                    count++;
                }
            }
        }
        window.saveToCloud();
    };

    window.delSimpleRow = (idx) => {
        const trip = window.trips[window.activeId];
        if(trip.isHistory) trip.days[0].rows.splice(idx,1);
        else {
            let count = 0;
            for(let dIdx=0; dIdx<trip.days.length; dIdx++){
                for(let rIdx=0; rIdx<trip.days[dIdx].rows.length; rIdx++){
                    if(count === idx) { 
                        trip.days[dIdx].rows.splice(rIdx,1); 
                        if(trip.days[dIdx].rows.length===0) trip.days.splice(dIdx,1);
                        break; 
                    }
                    count++;
                }
            }
        }
        renderTable(trip.isHistory); window.saveToCloud();
    };

    window.renderSidebar = () => {
        const l = document.getElementById('trip-list'); l.innerHTML = '';
        document.getElementById('go-dashboard').className = `dashboard-link ${window.activeId==='dashboard'?'active':''}`;
        Object.keys(window.trips).forEach(id => {
            const t = window.trips[id];
            const d = document.createElement('div'); 
            d.className = `trip-item ${id===window.activeId?'active':''} ${t.isHistory?'history-item':''}`;
            d.onclick = () => loadTrip(id);
            d.innerHTML = `<span>${t.isHistory?'📜':'📍'} ${t.name}</span>`;
            l.appendChild(d);
        });
    };

    window.addTrip = () => { const n = prompt("新行程名称"); if(n){ const id='t'+Date.now(); window.trips[id]={name:n, days:[{date:'', rows:[{loc:''}]}]}; window.saveToCloud(); loadTrip(id); } };
    window.addDay = () => { 
        const trip = window.trips[window.activeId];
        if(trip.isHistory) trip.days[0].rows.push({loc:''});
        else trip.days[trip.days.length-1].rows.push({loc:''});
        renderTable(trip.isHistory); window.saveToCloud(); 
    };
    function refreshView() { if (window.activeId === 'dashboard') loadDashboard(); else if (window.activeId) loadTrip(window.activeId); }
</script>
</body>
</html>
